<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="Shortform - AI-powered news aggregator with smart summaries from trusted sources worldwide" />
    <meta name="keywords" content="news, aggregator, AI, summaries, Claude, breaking news" />
    <meta name="author" content="Shortform News" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://shortform.news" />
    <meta property="og:title" content="Shortform - Your News, In Short" />
    <meta property="og:description" content="AI-powered news summaries from trusted sources worldwide" />
    
    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://shortform.news" />
    <meta property="twitter:title" content="Shortform - Your News, In Short" />
    <meta property="twitter:description" content="AI-powered news summaries from trusted sources worldwide" />
    
    <title>Shortform - Your News, In Short</title>

    <!-- Preconnect to common news article image CDNs to eliminate DNS+TLS
         latency for the first LCP image fetch. -->
    <link rel="preconnect" href="https://ichef.bbci.co.uk" />
    <link rel="preconnect" href="https://static01.nyt.com" />
    <link rel="preconnect" href="https://media.cnn.com" />
    <link rel="preconnect" href="https://a.guim.co.uk" />
    <link rel="preconnect" href="https://images.wsj.net" />
    <link rel="preconnect" href="https://cdn.vox-cdn.com" />

    <!-- Google AdSense — deferred until after the window load event so it
         doesn't compete for bandwidth during the critical LCP path. -->
    <script>
      window.addEventListener('load', function () {
        var s = document.createElement('script');
        s.async = true;
        s.src = 'https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8230549400439546';
        s.crossOrigin = 'anonymous';
        document.head.appendChild(s);
      });
    </script>
  </head>
  <body>
    <div id="root"></div>

    <!-- Early fetch: fire the news API request immediately on HTML parse,
         before the React bundle has even finished downloading. The result is
         stored in window.__newsPreload and consumed by newsApiClient.ts on
         first mount, eliminating the JS-parse → API-call waterfall step.

         We use GET so the response can be served from Vercel's Edge CDN
         on a cache hit, making the pre-flight resolve in ~20-50ms. -->
    <script>
      (function () {
        try {
          var countries = JSON.parse(localStorage.getItem('selectedCountries') || '["us"]');
          var categories = JSON.parse(localStorage.getItem('selectedCategories') || '["health-tech-science"]');
          if (!Array.isArray(countries) || countries.length === 0) countries = ['us'];
          if (!Array.isArray(categories) || categories.length === 0) categories = ['health-tech-science'];
          var p = new URLSearchParams();
          countries.forEach(function (c) { p.append('countries', c); });
          categories.forEach(function (c) { p.append('categories', c); });
          p.set('dateRange', '24h');
          p.set('language', 'en');
          var url = '/api/news?' + p.toString();
          window.__newsPreload = { url: url, promise: fetch(url) };
        } catch (e) { /* silently ignore — app still works without preload */ }
      })();
    </script>

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
